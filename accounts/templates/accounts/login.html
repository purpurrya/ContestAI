{% extends 'accounts/base.html' %}

{% block title %}Вход{% endblock %}

{% block content %}
<h1>Вход в систему</h1>

{% if form.errors %}
    <div style="background-color: #f8d7da; color: #721c24; padding: 10px; border-radius: 4px; margin-bottom: 20px;">
        <p>Неверное имя пользователя или пароль. Попробуйте снова.</p>
    </div>
{% endif %}

<form method="post">
    {% csrf_token %}
    
    <div class="form-group">
        <label for="{{ form.username.id_for_label }}">Имя пользователя:</label>
        <input type="text" name="username" id="{{ form.username.id_for_label }}" required autofocus>
    </div>

    <div class="form-group">
        <label for="{{ form.password.id_for_label }}">Пароль:</label>
        <input type="password" name="password" id="{{ form.password.id_for_label }}" required>
    </div>

    <button type="submit">Войти</button>
</form>

<p style="margin-top: 20px;">
    Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a>
</p>
{% endblock %}
